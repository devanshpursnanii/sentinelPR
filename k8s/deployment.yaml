# k8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-review-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: code-review-bot
  template:
    metadata:
      labels:
        app: code-review-bot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: bot
          image: ghcr.io/YOUR_USERNAME/code-review-bot:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: bot-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
---
# k8s/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: code-review-bot-svc
spec:
  selector:
    app: code-review-bot
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP